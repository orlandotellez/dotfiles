# Default shell placeholder (configured by Gentleman.Dots installer)
# GENTLEMAN_DEFAULT_SHELL
#
# Instalar tmux en debian/ubuntu
# sudo apt install tmux
#
# Primero instalar el tpm (tmux plugin manager)
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# abrimos tmux
#
# instalar todos los plugins:
# Ctrl + a, I
#
# actualizar plugins:
# Ctrl + a, U

# Carga TPM
set -g @plugin 'tmux-plugins/tpm'

# Tested options for TMUX compatibility
set -g @plugin 'tmux-plugins/tmux-sensible'

# Clipboard management
set -g @plugin 'tmux-plugins/tmux-yank'

# Tmux Navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# Tmux Resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Which Key
set -g @plugin 'alexwforsythe/tmux-which-key'

# Floating window
bind-key -n M-g if-shell -F '#{==:#{session_name},scratch}' {
  detach-client
} {
  # open in the same directory of the current pane
  display-popup -d "#{pane_current_path}" -E "tmux new-session -A -s scratch"
}

# Tema Kanagawa
set -g @plugin 'Nybkox/tmux-kanagawa'
#set -g @kanagawa-theme 'dragon'
set -g @kanagawa-plugins "git cpu-usage ram-usage"
set -g @kanagawa-ignore-window-colors true
set -g @kanagawa-ignore-status-colors true

# Opcional: formato más bonito
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "

set -g @kanagawa_cpu_color "#dba35f"
set -g @kanagawa_ram_color "#6b9789"

# --- terminal & key handling ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

set -s extended-keys off
set -g status-left-length 20
set -g status-right-length 100

# Modo vim
set -g mode-keys vi
if-shell 'uname | grep -q Darwin' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip"'

# Keymaps
unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind d split-window -v -c "#{pane_current_path}"

# Mouse support
set -g mouse on

# Status bar position
set -g status-position top

# Kill all sessions except current
bind K confirm-before -p "Kill all other sessions? (y/n)" "kill-session -a"

# Fix index
set -g base-index 1
setw -g pane-base-index 1


# TPM init
run '~/.tmux/plugins/tpm/tpm'

# Forzar que Kanagawa no interfiera con status bar
set -g @kanagawa-ignore-status-colors true
set -g @kanagawa-ignore-window-colors true

set -g status-style "bg=#000001"

# Tabs inactivas (transparentes)
set -g window-status-style "bg=default,fg=#000001"

# Tab activa
set -g window-status-current-style "bg=#56566f,fg=#ffffff"
